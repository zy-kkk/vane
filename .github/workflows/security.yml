name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "43 2 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          deny-licenses: AGPL-1.0-only, AGPL-3.0-only, GPL-2.0-only, GPL-3.0-only, SSPL-1.0

  codeql:
    name: CodeQL (${{ matrix.language }})
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, c-cpp]
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.cache/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg-archives
    steps:
      - name: Checkout with engine source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install C++ build dependencies
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            curl \
            flex \
            libtool \
            ninja-build \
            pkg-config \
            tar \
            unzip \
            zip
          python -m pip install \
            "cmake>=3.29" \
            "ninja>=1.10" \
            "pybind11[global]>=3.0.0" \
            "scikit-build-core>=0.11.4"

      - name: Restore vcpkg binary cache
        if: matrix.language == 'c-cpp'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache/vcpkg
            .cache/vcpkg-archives
          key: codeql-vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('vcpkg.json') }}

      - name: Install pinned native dependencies
        if: matrix.language == 'c-cpp'
        run: bash scripts/bootstrap_vcpkg.sh

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.language == 'c-cpp' && 'manual' || 'none' }}
          queries: security-extended

      - name: Trace the native build
        if: matrix.language == 'c-cpp'
        env:
          CMAKE_ARGS: -DCMAKE_C_COMPILER_LAUNCHER= -DCMAKE_CXX_COMPILER_LAUNCHER=
          SKBUILD_BUILD_DIR: ${{ github.workspace }}/build/codeql
          SKBUILD_CMAKE_BUILD_TYPE: Release
        run: python -m pip install . --no-build-isolation --no-deps -v

      - name: Analyze
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: /language:${{ matrix.language }}
