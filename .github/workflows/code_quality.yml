name: Code quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        type: string
        description: Git ref to check
        required: false
  workflow_call:
    inputs:
      git_ref:
        type: string
        description: Git ref to check
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate-format-script:
    name: Validate format helper (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install format tools
        run: python -m pip install pre-commit

      - name: Install shfmt on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shfmt

      - name: Install shfmt on macOS
        if: runner.os == 'macOS'
        run: brew install shfmt

      - name: Validate helper script
        run: |
          bash -n scripts/format
          scripts/format --help
          scripts/format root

  run-checks:
    name: Lint, format and type checks for changed files
    needs: validate-format-script
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shfmt
          python -m pip install pre-commit

      - name: Restore pre-commit cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit for the changed range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          head_ref="$(git rev-parse HEAD)"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base_ref="$PR_BASE_SHA"
            pre-commit run \
              --show-diff-on-failure \
              --color=always \
              --from-ref "$base_ref" \
              --to-ref "$head_ref"
            exit
          elif [[ -n "$PUSH_BEFORE_SHA" && ! "$PUSH_BEFORE_SHA" =~ ^0+$ ]] && \
               git cat-file -e "$PUSH_BEFORE_SHA^{commit}" 2>/dev/null; then
            base_ref="$PUSH_BEFORE_SHA"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            base_ref="HEAD^"
          else
            pre-commit run --show-diff-on-failure --color=always --all-files
            exit
          fi

          # A force-push can make before and HEAD sibling commits. Compare the
          # endpoint trees directly so pre-commit does not expand the range
          # back to their merge base and lint unrelated files.
          mapfile -d '' changed_files < <(
            git diff --name-only --diff-filter=ACMRT -z "$base_ref" "$head_ref" --
          )
          if ((${#changed_files[@]} == 0)); then
            echo "No files changed between $base_ref and $head_ref."
            exit
          fi

          pre-commit run \
            --show-diff-on-failure \
            --color=always \
            --files "${changed_files[@]}"
