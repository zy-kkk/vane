name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-package:
    name: Source package (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build and validate source package
        run: |
          python -m pip install --upgrade build pip "tomli>=1.1; python_version < '3.11'"
          python -m build --sdist --outdir dist
          python scripts/check_release_artifacts.py dist/*.tar.gz

  native-fast-tests:
    name: Native build and fast tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.cache/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg-archives
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            ccache \
            curl \
            flex \
            libtool \
            ninja-build \
            pkg-config \
            tar \
            unzip \
            zip

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Restore vcpkg binary cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache/vcpkg
            .cache/vcpkg-archives
          key: vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('vcpkg.json') }}

      - name: Install pinned native dependencies
        run: bash scripts/bootstrap_vcpkg.sh

      - name: Install Python build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            build \
            "cmake>=3.29" \
            "ninja>=1.10" \
            "pybind11[global]>=3.0.0" \
            "scikit-build-core>=0.11.4" \
            packaging \
            pytest

      - name: Build and run native distributed tests
        if: matrix.python-version == '3.12'
        run: scripts/run_native_tests.sh "[distributed]"

      - name: Build release artifacts
        env:
          SKBUILD_BUILD_DIR: ${{ github.workspace }}/build
          SKBUILD_CMAKE_BUILD_TYPE: Release
        run: python -m build --sdist --wheel --no-isolation --outdir dist

      - name: Validate release artifacts
        run: python scripts/check_release_artifacts.py dist/*.tar.gz dist/*.whl

      - name: Install the built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Verify the base installation Quickstart outside the checkout
        env:
          # Keep this distributed smoke test within a standard 16 GB runner.
          VANE_FTE_TASK_HEAP_BYTES: "1073741824"
          VANE_UDF_TASK_HEAP_BYTES: "1073741824"
        run: |
          cd "$RUNNER_TEMP"
          env -u VANE_RUNNER python "$GITHUB_WORKSPACE/scripts/verify_base_install.py"

      - name: Run the base-installation release tests
        run: scripts/run_release_tests.sh

      - name: Upload validated artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-python-artifacts-${{ matrix.python-version }}
          path: dist/*
          if-no-files-found: error
