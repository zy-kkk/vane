name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      destination:
        description: Build only, or publish the candidate to TestPyPI
        type: choice
        options:
          - build-only
          - testpypi
        default: build-only
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source-package:
    name: Build source package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout the release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Require the release tag to match the package version
        if: github.event_name == 'release'
        run: |
          expected_tag="v$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "$expected_tag"

      - name: Build and validate the source package
        run: |
          python -m pip install --upgrade build pip
          python -m build --sdist --outdir dist
          python scripts/check_release_artifacts.py dist/*.tar.gz

      - name: Upload source package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  wheels:
    name: Build manylinux wheels
    needs: source-package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release tooling
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Download the exact source package
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-sdist
          path: dist

      - name: Locate source package
        id: sdist
        run: |
          path="$(find dist -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          test -n "$path"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Build wheels from the source package
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        with:
          package-dir: ${{ steps.sdist.outputs.path }}
          output-dir: wheelhouse
          config-file: "{package}/pyproject.toml"

      - name: Validate wheels
        run: |
          test "$(find wheelhouse -maxdepth 1 -type f -name '*.whl' | wc -l)" -eq 5
          python scripts/check_release_artifacts.py wheelhouse/*.whl

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-wheels
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 14

  assemble:
    name: Validate, attest and sign artifacts
    needs: wheels
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Checkout release tooling
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Download source package
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-sdist
          path: packages

      - name: Download wheels
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-wheels
          path: packages

      - name: Validate the complete distribution set
        run: |
          test "$(find packages -maxdepth 1 -type f -name '*.tar.gz' | wc -l)" -eq 1
          test "$(find packages -maxdepth 1 -type f -name '*.whl' | wc -l)" -eq 5
          python scripts/check_release_artifacts.py packages/*.tar.gz packages/*.whl

      - name: Generate checksums
        run: |
          mkdir -p release-assets
          (cd packages && sha256sum *.tar.gz *.whl) > release-assets/SHA256SUMS

      - name: Generate a CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: packages
          format: cyclonedx-json
          output-file: release-assets/vane-ai-sbom.cdx.json
          upload-artifact: false

      - name: Attest distribution provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ github.workspace }}/packages/*

      - name: Sign distributions with Sigstore
        uses: sigstore/gh-action-sigstore-python@f7ad0af51a5648d09a20d00370f0a91c3bdf8f84 # v3.0.1
        with:
          inputs: |
            packages/*.tar.gz
            packages/*.whl

      - name: Upload clean Python distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-distributions
          path: |
            packages/*.tar.gz
            packages/*.whl
          if-no-files-found: error
          retention-days: 14

      - name: Upload checksums, SBOM and signatures
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-supplemental
          path: |
            release-assets/*
            packages/*.sigstore.json
          if-no-files-found: error
          retention-days: 14

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && inputs.destination == 'testpypi'
    needs: assemble
    runs-on: ubuntu-24.04
    environment:
      name: testpypi
      url: https://test.pypi.org/p/vane-ai
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-distributions
          path: dist

      - name: Publish through trusted publishing
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: assemble
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/vane-ai
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-distributions
          path: dist

      - name: Publish through trusted publishing
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: dist

  publish-github-release:
    name: Attach release assets
    if: github.event_name == 'release'
    needs: assemble
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-distributions
          path: release-files

      - name: Download supplemental assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-supplemental
          path: release-files

      - name: Attach immutable assets to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" release-files/*
